name: Data Refresh

on:
  workflow_dispatch:
    inputs:
      normalize_years:
        description: "Anos para normalizacao (separados por espaco)"
        required: false
        default: "2018 2020 2022 2024"
        type: string
      publish_to_r2:
        description: "Publicar curated/snapshots no Cloudflare R2"
        required: false
        default: true
        type: boolean
      keep_snapshots:
        description: "Qtd de snapshots remotos para manter no R2"
        required: false
        default: "7"
        type: string
  schedule:
    - cron: "0 9 * * 1"

jobs:
  normalize-and-snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch configured TSE sources
        run: |
          if [ -n "${{ secrets.TSE_SOURCES_JSON }}" ]; then
            printf '%s' '${{ secrets.TSE_SOURCES_JSON }}' > /tmp/tse_sources.json
            python scripts/fetch_sources.py --config /tmp/tse_sources.json --raw-dir data/raw
          elif [ -f config/tse_sources.json ]; then
            python scripts/fetch_sources.py --config config/tse_sources.json --raw-dir data/raw
          else
            echo "No remote source config found (secret/local file); skipping remote fetch."
          fi

      - name: Check raw data availability
        id: raw_check
        run: |
          CSV_COUNT=$(find data/raw -type f -name '*.csv' | wc -l | tr -d ' ')
          echo "csv_count=$CSV_COUNT" >> "$GITHUB_OUTPUT"
          echo "CSV files found: $CSV_COUNT"

      - name: Normalize raw data
        if: steps.raw_check.outputs.csv_count != '0'
        run: |
          NORMALIZE_YEARS="${{ inputs.normalize_years || '2018 2020 2022 2024' }}"
          echo "Normalize years: $NORMALIZE_YEARS"
          python scripts/normalize.py \
            --raw-dir data/raw \
            --years $NORMALIZE_YEARS \
            --quality-gate \
            --max-duplicate-rows 0 \
            --max-negative-votes 0 \
            --max-required-null-rate 0.02 \
            --output data/curated/analytics.csv \
            --report data/curated/quality_report.json \
            --manifest data/curated/manifest.json

      - name: Publish snapshot
        if: steps.raw_check.outputs.csv_count != '0'
        run: python scripts/publish_snapshot.py

      - name: Go/No-Go validation
        if: steps.raw_check.outputs.csv_count != '0'
        run: |
          python scripts/go_no_go.py \
            --analytics data/curated/analytics.csv \
            --quality-report data/curated/quality_report.json \
            --manifest data/curated/manifest.json \
            --require-release \
            --max-duplicate-rows 0 \
            --max-negative-votes 0 \
            --max-required-null-rate 0.02

      - name: Upload curated artifacts
        if: steps.raw_check.outputs.csv_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: curated-output
          path: |
            data/curated/analytics.csv
            data/curated/quality_report.json
            data/curated/manifest.json

      - name: Upload release snapshots
        if: steps.raw_check.outputs.csv_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: releases
          path: data/releases

      - name: Publish curated/snapshots to Cloudflare R2
        if: steps.raw_check.outputs.csv_count != '0'
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          PUBLISH_TO_R2="${{ github.event_name != 'workflow_dispatch' || inputs.publish_to_r2 }}"
          KEEP_SNAPSHOTS="${{ inputs.keep_snapshots || '7' }}"

          if [ "$PUBLISH_TO_R2" != "true" ]; then
            echo "R2 publish disabled for this run."
            exit 0
          fi

          if [ -z "$R2_ACCOUNT_ID" ] || [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ] || [ -z "$R2_BUCKET" ]; then
            echo "R2 secrets are missing; skipping R2 publish."
            exit 0
          fi

          python scripts/upload_to_r2.py \
            --account-id "$R2_ACCOUNT_ID" \
            --access-key-id "$R2_ACCESS_KEY_ID" \
            --secret-access-key "$R2_SECRET_ACCESS_KEY" \
            --bucket "$R2_BUCKET" \
            --source-dir data/curated \
            --releases-dir data/releases \
            --keep-snapshots "$KEEP_SNAPSHOTS"
