name: Keep Alive

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Validate configuration
        run: |
          if [ -z "${HEALTHCHECK_URL}" ]; then
            echo "Missing secret: RENDER_HEALTHCHECK_URL"
            exit 1
          fi
        env:
          HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}

      - name: Ping health endpoint
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            HTTP_CODE="$(curl -sS -L --max-time 20 --retry 2 --retry-delay 2 --output /tmp/keepalive_body.txt --write-out "%{http_code}" "${HEALTHCHECK_URL}")"
            echo "healthcheck_status=${HTTP_CODE} (attempt=${attempt})"

            case "${HTTP_CODE}" in
              2*) ;;
              *)
                echo "Healthcheck failed. Response body:"
                cat /tmp/keepalive_body.txt || true
                exit 1
                ;;
            esac

            # Sends additional pings inside the same run to reduce the effective interval.
            if [ "${attempt}" -lt 3 ]; then
              sleep 120
            fi
          done
        env:
          HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
